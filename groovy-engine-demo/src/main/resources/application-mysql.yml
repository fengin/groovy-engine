# MySQL 配置示例
# 使用方式：java -jar groovy-engine-demo.jar --spring.profiles.active=mysql
# 或在 application.yml 中添加：spring.profiles.active: mysql

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/groovy_engine?useSSL=false&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: your-password
  sql:
    init:
      mode: never   # MySQL 请手动执行 db/schema.sql 建表
  h2:
    console:
      enabled: false
